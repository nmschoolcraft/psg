# .github/workflows/deploy.yml
# Copy this file into Phoenix-Solutions-Group/prostat_files at:
#   .github/workflows/deploy.yml
#
# Required GitHub secrets (set in repo Settings → Secrets → Actions):
#   DEPLOY_HOST      — 144.76.216.70
#   DEPLOY_USER      — prostatgun  (or root if preferred)
#   DEPLOY_SSH_KEY   — private key contents (see setup instructions)
#   DEPLOY_PORT      — 22  (cPanel SSH port — confirm with host)

name: Deploy ProStat

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: You must type 'deploy' in the confirm field to proceed."
            exit 1
          fi

  deploy:
    name: Deploy to app.prostatgun.com
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            DEPLOY_DIR="/home/prostatgun/public_html"
            BRANCH="main"

            echo "=== ProStat Deploy — $(date -u) ==="
            echo "Host: $(hostname)"
            echo "Dir:  $DEPLOY_DIR"
            echo "Branch: $BRANCH"
            echo ""

            # Pull latest code
            cd "$DEPLOY_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo ""
            echo "=== Code updated to: $(git rev-parse --short HEAD) ==="

            # Clear PHP OPcache via CLI if available
            # Uncomment if OPcache is enabled and php-cli can reset it:
            # php -r "opcache_reset();" 2>/dev/null && echo "OPcache cleared" || true

            # Reload Apache to pick up any config/env changes (requires sudo or WHM hook)
            # Uncomment if the deploy user has sudo access to reload apache:
            # sudo /usr/sbin/apachectl graceful 2>/dev/null && echo "Apache reloaded" || true

            echo ""
            echo "=== Deploy complete ==="

      - name: Smoke test
        run: |
          echo "Running smoke test against app.prostatgun.com..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://app.prostatgun.com)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "SMOKE TEST FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed."
