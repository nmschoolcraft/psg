name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://portal.psgweb.me

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Build (Vercel)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_APP_URL: https://portal.psgweb.me

      - name: Deploy prebuilt to Vercel
        id: deploy
        continue-on-error: true
        run: |
          set -o pipefail
          npx vercel@latest deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --debug 2>&1 | tee /tmp/vercel-deploy.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Show deploy output (always)
        if: always()
        run: |
          echo "=== VERCEL DEPLOY LOG ==="
          cat /tmp/vercel-deploy.log 2>/dev/null || echo "(no log)"
          echo "=== ENV CHECK (no secrets) ==="
          echo "VERCEL_ORG_ID set: ${{ secrets.VERCEL_ORG_ID != '' }}"
          echo "VERCEL_PROJECT_ID set: ${{ secrets.VERCEL_PROJECT_ID != '' }}"
          echo "VERCEL_TOKEN set: ${{ secrets.VERCEL_TOKEN != '' }}"

      - name: Fail if deploy failed
        if: steps.deploy.outcome == 'failure'
        run: exit 1
