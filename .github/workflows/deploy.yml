name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://portal.psgweb.me

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Validate Vercel token + project
        run: |
          echo "Checking Vercel token..."
          TOKEN_RESP=$(curl -s -o /tmp/token_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v2/user")
          echo "Token check HTTP: $TOKEN_RESP"
          cat /tmp/token_check.json | head -c 200
          echo ""

          echo "Checking project..."
          PROJ_RESP=$(curl -s -o /tmp/proj_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}")
          echo "Project check HTTP: $PROJ_RESP"
          cat /tmp/proj_check.json | head -c 300
          echo ""

      - name: Build (Vercel)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://portal.psgweb.me

      - name: Show .vercel/project.json
        run: cat .vercel/project.json 2>/dev/null || echo "no project.json found"

      - name: Deploy prebuilt to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
