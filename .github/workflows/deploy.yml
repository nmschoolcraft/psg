name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://portal.psgweb.me

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Sync runtime env vars to Vercel project
        run: |
          # Use vercel env CLI — handles auth + team scope automatically
          for KEY_VALUE in \
            "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL_VAL" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_VAL" \
            "NEXT_PUBLIC_APP_URL=https://portal.psgweb.me"; do
            KEY="${KEY_VALUE%%=*}"
            VALUE="${KEY_VALUE#*=}"
            # Remove existing then re-add (vercel env add fails if already set)
            printf '%s' "$VALUE" | npx vercel@latest env add "$KEY" production \
              --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 || \
            (npx vercel@latest env rm "$KEY" production --yes \
              --token=${{ secrets.VERCEL_TOKEN }} 2>&1 && \
             printf '%s' "$VALUE" | npx vercel@latest env add "$KEY" production \
              --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
            echo "Synced $KEY"
          done
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL_VAL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_VAL: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Pull Vercel project config
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (local — secrets available here)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://portal.psgweb.me

      - name: Deploy prebuilt to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Ensure portal.psgweb.me is linked to this project
        run: |
          TEAM_PARAM=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then
            TEAM_PARAM="?teamId=$VERCEL_ORG_ID"
          fi
          RESP=$(curl -s -X POST \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains${TEAM_PARAM}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"portal.psgweb.me"}')
          echo "Domain link response: $RESP"
          # Report to ntfy for debugging
          printf 'domain-link SHA=%s PROJ=%s\nRESP=%s' \
            "${{ github.sha }}" "$VERCEL_PROJECT_ID" "$RESP" \
            | curl -s -X POST "https://ntfy.sh/psg-vercel-deploy-8x7k2" \
              -H "Content-Type: text/plain" --data-binary @- || true
        continue-on-error: true

      - name: Disable Vercel SSO/Authentication protection
        run: |
          node - <<'EOF'
          const https = require('https')
          const TOKEN = process.env.VERCEL_TOKEN
          const PROJECT_ID = process.env.VERCEL_PROJECT_ID
          const TEAM_ID = process.env.VERCEL_ORG_ID
          const teamParam = TEAM_ID && TEAM_ID.startsWith('team_') ? `?teamId=${TEAM_ID}` : ''

          const options = {
            hostname: 'api.vercel.com',
            path: `/v9/projects/${PROJECT_ID}${teamParam}`,
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
          }
          const req = https.request(options, res => {
            let d = ''
            res.on('data', c => d += c)
            res.on('end', () => {
              const r = JSON.parse(d)
              console.log(`HTTP ${res.statusCode} — ssoProtection: ${JSON.stringify(r.ssoProtection)}`)
            })
          })
          req.on('error', e => console.error('API error (non-fatal):', e.message))
          req.write(JSON.stringify({ ssoProtection: null }))
          req.end()
          EOF
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
