name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://portal.psgweb.me

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Sync runtime env vars to Vercel project
        run: |
          node - <<'EOF'
          const https = require('https')
          const TOKEN = process.env.VERCEL_TOKEN
          const PROJECT_ID = process.env.VERCEL_PROJECT_ID
          const TEAM_ID = process.env.VERCEL_ORG_ID
          const teamParam = TEAM_ID && TEAM_ID.startsWith('team_') ? `?teamId=${TEAM_ID}` : ''

          const vars = [
            { key: 'NEXT_PUBLIC_SUPABASE_URL', value: process.env.SUPABASE_URL_VAL },
            { key: 'NEXT_PUBLIC_SUPABASE_ANON_KEY', value: process.env.SUPABASE_ANON_VAL },
            { key: 'NEXT_PUBLIC_APP_URL', value: 'https://portal.psgweb.me' },
          ]

          function req(method, path, body) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.vercel.com', path, method,
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
              }
              const r = https.request(options, res => {
                let d = ''
                res.on('data', c => d += c)
                res.on('end', () => { try { resolve(JSON.parse(d)) } catch { resolve({}) } })
              })
              r.on('error', reject)
              if (body) r.write(JSON.stringify(body))
              r.end()
            })
          }

          async function main() {
            const list = await req('GET', `/v9/projects/${PROJECT_ID}/env${teamParam}`)
            for (const v of vars) {
              const existing = (list.envs || []).find(
                e => e.key === v.key && e.target && e.target.includes('production')
              )
              if (existing) {
                await req('PATCH', `/v9/projects/${PROJECT_ID}/env/${existing.id}${teamParam}`, { value: v.value, target: ['production'] })
                console.log(`Updated ${v.key}`)
              } else {
                await req('POST', `/v9/projects/${PROJECT_ID}/env${teamParam}`, { key: v.key, value: v.value, target: ['production'], type: 'plain' })
                console.log(`Created ${v.key}`)
              }
            }
          }
          main().catch(e => { console.error('Env sync error:', e.message); process.exit(1) })
          EOF
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL_VAL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_VAL: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Pull Vercel project config
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (local — secrets available here)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://portal.psgweb.me

      - name: Deploy prebuilt to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Disable Vercel SSO/Authentication protection
        run: |
          node - <<'EOF'
          const https = require('https')
          const TOKEN = process.env.VERCEL_TOKEN
          const PROJECT_ID = process.env.VERCEL_PROJECT_ID
          const TEAM_ID = process.env.VERCEL_ORG_ID
          const teamParam = TEAM_ID && TEAM_ID.startsWith('team_') ? `?teamId=${TEAM_ID}` : ''

          const options = {
            hostname: 'api.vercel.com',
            path: `/v9/projects/${PROJECT_ID}${teamParam}`,
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
          }
          const req = https.request(options, res => {
            let d = ''
            res.on('data', c => d += c)
            res.on('end', () => {
              const r = JSON.parse(d)
              console.log(`HTTP ${res.statusCode} — ssoProtection: ${JSON.stringify(r.ssoProtection)}`)
            })
          })
          req.on('error', e => console.error('API error (non-fatal):', e.message))
          req.write(JSON.stringify({ ssoProtection: null }))
          req.end()
          EOF
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
