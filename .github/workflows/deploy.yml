name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://portal.psgweb.me

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Pull Vercel project config
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (local — secrets available here)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://portal.psgweb.me

      - name: Deploy prebuilt to Vercel
        id: deploy
        run: |
          npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} \
            2>&1 | tee /tmp/deploy_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Report result
        if: always()
        run: |
          OUTPUT=$(cat /tmp/deploy_output.txt 2>/dev/null | tail -60)
          SHA="${{ github.sha }}"
          STATUS="${{ steps.deploy.outputs.exit_code }}"
          printf '[%s] exit=%s\n%s' "$SHA" "$STATUS" "$OUTPUT" \
            | curl -s -X POST "https://ntfy.sh/psg-vercel-deploy-8x7k2" \
              -H "Content-Type: text/plain" --data-binary @- || true

      - name: Fail if deploy failed
        if: steps.deploy.outputs.exit_code != '0'
        run: exit 1
